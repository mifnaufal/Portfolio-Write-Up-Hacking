{% extends "base.html" %}
{% block title %}{{ writeup.title }}{% endblock %}
{% block content %}

<article style="max-width: 800px; margin: 0 auto;">
  <header style="margin-bottom: 2rem;">
    <div class="flex gap-2" style="margin-bottom: 1rem;">
      {% for cat in categories %}
        <span class="badge">{{ cat }}</span>
      {% endfor %}
    </div>
    <h1 style="font-size: 2rem; margin-bottom: 1rem;">{{ writeup.title }}</h1>
    <div class="article-meta" style="color: var(--text-secondary);">
      <span>📅 {{ writeup.created_at[:10] }}</span>
      <span>⏱️ Baca 5 menit</span>
    </div>
  </header>
  
  <div class="article-content" style="background: var(--bg-secondary); padding: 2rem; border-radius: 16px; border: 1px solid var(--border);">
    {{ html_content|safe }}
  </div>
  
  <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border);">
    <a href="{{ url_for('index') }}" class="btn btn-secondary">← Kembali ke Home</a>
  </div>
</article>

{% endblock %}
