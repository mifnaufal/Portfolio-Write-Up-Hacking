{% extends "base.html" %}
{% block title %}Kategori{% endblock %}
{% block content %}
<h2>📂 Kategori</h2>
<form method="post">{{ form.hidden_tag() }}{{ form.name() }} {{ form.submit() }}</form>
<ul>
  {% for c in categories %}
  <li>{{ c.name }} 
    <form method="post" action="{{ url_for('admin_cat_edit', id=c.id) }}" style="display:inline;margin:0 .5rem">
      <input name="name" value="{{ c.name }}" style="width:auto;padding:.25rem"><button>💾</button>
    </form>
    <form method="post" action="{{ url_for('admin_cat_delete', id=c.id) }}" style="display:inline" onsubmit="return confirm('Hapus?')">
      <button style="background:#ef4444">🗑️</button>
    </form>
  </li>{% endfor %}
</ul>
<a href="{{ url_for('admin_writeups') }}">→ Write-Up</a> | <a href="{{ url_for('admin_logout') }}">Logout</a>
{% endblock %}
