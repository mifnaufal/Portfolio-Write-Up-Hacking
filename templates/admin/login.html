{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block head %}
<style>
  .login-glow {
    box-shadow: 0 0 60px rgba(245, 158, 11, 0.15);
  }
</style>
{% endblock %}
{% block content %}

<div class="min-h-[calc(100vh-200px)] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md animate-fade-in-up">
    <div class="bg-dark-800/50 border border-dark-700/50 rounded-3xl p-8 sm:p-10 login-glow">
      <div class="text-center mb-10">
        <div class="w-20 h-20 mx-auto mb-6 rounded-3xl bg-gradient-to-br from-accent-400 to-accent-600 flex items-center justify-center text-4xl shadow-lg shadow-accent-400/25">
          🔐
        </div>
        <h1 class="text-2xl sm:text-3xl font-bold tracking-tight mb-2">Admin Login</h1>
        <p class="text-dark-400">Masuk untuk mengelola write-up</p>
      </div>
      
      <form method="post" class="space-y-6">
        {{ form.hidden_tag() }}
        
        <div class="space-y-2">
          <label for="username" class="block text-sm font-medium text-dark-200">Username</label>
          <div class="relative">
            <input 
              type="text" 
              name="username" 
              id="username" 
              placeholder="Masukkan username"
              required
              class="w-full bg-dark-700/50 border border-dark-600 rounded-xl px-5 py-4 pl-12 text-white placeholder:text-dark-400 focus:outline-none focus:border-accent-400/50 focus:ring-2 focus:ring-accent-400/20 transition-all duration-300"
            >
            <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-dark-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
          </div>
        </div>
        
        <div class="space-y-2">
          <label for="password" class="block text-sm font-medium text-dark-200">Password</label>
          <div class="relative">
            <input 
              type="password" 
              name="password" 
              id="password" 
              placeholder="Masukkan password"
              required
              class="w-full bg-dark-700/50 border border-dark-600 rounded-xl px-5 py-4 pl-12 text-white placeholder:text-dark-400 focus:outline-none focus:border-accent-400/50 focus:ring-2 focus:ring-accent-400/20 transition-all duration-300"
            >
            <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-dark-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
          </div>
        </div>
        
        <button 
          type="submit" 
          class="btn-primary w-full py-4 bg-gradient-to-r from-accent-400 to-accent-500 text-dark-900 font-semibold rounded-xl shadow-lg shadow-accent-400/25 hover:shadow-accent-400/40 transition-all duration-300 flex items-center justify-center gap-2"
        >
          <span>Masuk</span>
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
          </svg>
        </button>
      </form>
      
      <div class="mt-8 pt-8 border-t border-dark-700 text-center">
        <a href="{{ url_for('index') }}" class="inline-flex items-center gap-2 text-dark-400 hover:text-accent-400 transition-colors text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          <span>Kembali ke Home</span>
        </a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
