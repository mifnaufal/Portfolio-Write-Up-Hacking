{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<h2>🔐 Login Admin</h2>
<form method="post">{{ form.hidden_tag() }}
  <p>{{ form.username.label }} {{ form.username(size=32) }}</p>
  <p>{{ form.password.label }} {{ form.password(size=32) }}</p>
  <p>{{ form.submit() }}</p>
</form>
{% endblock %}
