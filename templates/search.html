{% extends "base.html" %}
{% block title %}Hasil: {{ query }}{% endblock %}
{% block content %}
<h2>🔍 "{{ query }}"</h2>
<ul>
{% for w in results %}<li><a href="{{ url_for('writeup_detail', slug=w.slug) }}">{{ w.title }}</a></li>
{% else %}<li>Tidak ditemukan.</li>{% endfor %}
</ul>
<a href="{{ url_for('index') }}">← Kembali</a>
{% endblock %}
